<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Opportu NEST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div id="login" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;gap:20px;">
        <h1>Admin Login</h1>
        <input type="text" id="user" placeholder="Username" style="padding:10px;width:250px;">
        <input type="password" id="pass" placeholder="Password" style="padding:10px;width:250px;">
        <button onclick="login()" style="padding:10px 30px;background:#4a90e2;color:white;border:none;cursor:pointer;">Login</button>
    </div>

    <div id="dashboard" style="display:none;">
        <nav style="background:#2c3e50;color:white;padding:15px;display:flex;justify-content:space-between;">
            <h2>Opportu NEST Admin</h2>
            <button onclick="logout()" style="padding:8px 15px;background:#e74c3c;color:white;border:none;cursor:pointer;">Logout</button>
        </nav>

        <main style="padding:30px;">
            <div style="display:flex;gap:15px;margin-bottom:20px;">
                <input type="text" id="search" placeholder="Search..." onkeyup="loadOpp()" style="padding:10px;flex:1;">
                <select id="cat" onchange="loadOpp()" style="padding:10px;">
                    <option value="">All Categories</option>
                    <option value="Scholarship">Scholarship</option>
                    <option value="Internship">Internship</option>
                    <option value="Event">Event</option>
                </select>
                <button onclick="openForm()" style="padding:10px 20px;background:#27ae60;color:white;border:none;cursor:pointer;">+ Add New</button>
            </div>

            <div id="list" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px;"></div>
        </main>
    </div>

    
    <div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
        <div style="background:white;padding:25px;border-radius:8px;width:90%;max-width:500px;">
            <h2 id="modalTitle">Add Opportunity</h2>
            <input type="hidden" id="editId">
            <input type="text" id="title" placeholder="Title" style="width:100%;padding:8px;margin:8px 0;">
            <select id="category" style="width:100%;padding:8px;margin:8px 0;">
                <option>Scholarship</option>
                <option>Internship</option>
                <option>Event</option>
            </select>
            <input type="text" id="org" placeholder="Organization" style="width:100%;padding:8px;margin:8px 0;">
            <input type="text" id="description" placeholder="Description" style="width:100%;padding:8px;margin:8px 0;">
            <input type="text" id="deadline" placeholder="Deadline (YYYY/MM/DD)" style="width:100%;padding:8px;margin:8px 0;">
            <input type="text" id="location" placeholder="Location" style="width:100%;padding:8px;margin:8px 0;">
            <input type="text" id="fee" placeholder="Fee" style="width:100%;padding:8px;margin:8px 0;">
            <input type="text" id="payment" placeholder="Payment" style="width:100%;padding:8px;margin:8px 0;">
            <div style="display:flex;gap:10px;margin-top:15px;">
                <button onclick="save()" style="flex:1;padding:10px;background:#4a90e2;color:white;border:none;cursor:pointer;">Save</button>
                <button onclick="closeForm()" style="flex:1;padding:10px;background:#999;color:white;border:none;cursor:pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
